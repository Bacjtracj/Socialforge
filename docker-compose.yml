# SocialForge - Docker Compose
#
# Usage:
#   docker compose up -d          # Start in background
#   docker compose logs -f        # View logs
#   docker compose down           # Stop

services:
  socialforge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: socialforge
    ports:
      - "3333:3333"
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - socialforge-data:/app/data
      - ./socialforge/squads:/app/socialforge/squads
    restart: unless-stopped

volumes:
  socialforge-data:
    name: socialforge-data
