  - pipeline/data/checklist-clausulas.md
  - pipeline/data/modelo-onboarding.md
  - pipeline/data/servicos-por-tipo.md
  - pipeline/data/anti-patterns-comercial.md

agents:
  - id: consultor
    name: "Rafa Preço"
    icon: "💰"

  - id: juridico
    name: "Clara Contrato"
    icon: "📋"

  - id: onboarding
